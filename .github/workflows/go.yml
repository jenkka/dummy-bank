name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
        postgres:
          image: postgres
          env:
            POSTGRES_DB: basic_bank_app
            POSTGRES_USER: root
            POSTGRES_PASSWORD: secret
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
          ports:
            - 5432:5432

    steps:
      - name: Checks out repository code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Install go-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xvz
          mv migrate.linux-arm64 /usr/bin/migrate
          which migrate

      - name: Build
        run: go build -v ./...

      - name: Setup database
        run: make migrate-db-up

      - name: Test
        run: make test
