syntax = "proto3";

package dummybank.v1;

import "dummybank/v1/rpc_create_user.proto";
import "dummybank/v1/rpc_login_user.proto";
import "google/api/annotations.proto";

option go_package = "github.com/jenkka/dummy-bank/pb/dummybank/v1;dummybankv1";

service DummyBankService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
  }
  rpc LoginUser(LoginUserRequest) returns (LoginUserResponse) {
    option (google.api.http) = {
      post: "/v1/users/login"
      body: "*"
    };
  }
}
